<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<link rel="stylesheet" href="/static/appui.css">
<style>
  .kpi .ico{ font-size:1.05rem; margin-bottom:5px; }
  .plist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-top:6px; }
  .pcard{ background:var(--card); border:1px solid var(--line); border-radius:13px; padding:16px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
  .pcard.best{ border-color:rgba(0,212,255,.5); box-shadow:0 10px 26px rgba(0,212,255,.14); }
  .pcard::before{ content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--grad); }
  .pcard .nm{ font-weight:800; font-size:1rem; margin-bottom:2px; }
  .pcard .vids{ font-size:.76rem; color:var(--muted); margin-bottom:12px; }
  .pcard .stats{ display:flex; gap:16px; }
  .pcard .stats .v{ font-size:1.15rem; font-weight:800; line-height:1; }
  .pcard .stats .k{ font-size:.66rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:3px; }
  .topbadge{ position:absolute; top:12px; right:12px; font-size:.62rem; font-weight:800; text-transform:uppercase;
    background:#d1fae5; color:#065f46; padding:2px 8px; border-radius:999px; }
</style>
</head>
<body>
  <div class="top">
    <span class="brand"><img src="/static/logo-icon.png?v=2" alt="">Tokverse Studio</span>
    <span class="nav">
      <a href="/">Create</a><a href="/dashboard">Dashboard</a><a href="/characters">Characters</a>
      <a href="/content-library">Library</a>
      <a href="/products" class="active">Products</a><a href="/learnings">Learnings</a><a href="/analytics">Analytics</a><a href="/settings">Settings</a>
    </span>
  </div>
  <div class="main">
  <div class="topbar">
    <button id="logoutBtn">Log out</button>
  </div>
  <div class="wrap">
    <h2>Products</h2>
    <div class="kpis" id="kpis"></div>
    <div id="list"><div class="empty">Loading…</div></div>
  </div>
  </div>
<script>
const $=id=>document.getElementById(id);
async function api(p,o){ const r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));
  if(r.status===401){ location.href='/login'; throw new Error('unauth'); } return r; }
$('logoutBtn').onclick=async()=>{ await api('/api/auth/logout',{method:'POST'}); location.href='/login'; };
function nfmt(n){ return (n||0).toLocaleString(); }
function kpi(ico,n,l){ return `<div class="kpi"><div class="ico">${ico}</div><div class="n">${n}</div><div class="l">${l}</div></div>`; }
(async()=>{
  const d=await (await api('/api/products')).json();
  let p=(d.products||[]).slice();
  if(!p.length){ $('kpis').innerHTML=''; $('list').innerHTML='<div class="empty">No products yet — generate videos and they’ll group here by topic.</div>'; return; }
  // sort by views (best first)
  p.sort((a,b)=>(b.views||0)-(a.views||0));
  const totV=p.reduce((s,x)=>s+(x.videos||0),0), totViews=p.reduce((s,x)=>s+(x.views||0),0),
        totLikes=p.reduce((s,x)=>s+(x.likes||0),0);
  $('kpis').innerHTML = kpi('📦',nfmt(p.length),'Products')+kpi('🎬',nfmt(totV),'Videos')
    +kpi('👁️',nfmt(totViews),'Total Views')+kpi('❤️',nfmt(totLikes),'Total Likes');
  const hasPerf = totViews>0;
  $('list').innerHTML = `<div class="plist">${p.map((r,i)=>`
    <div class="pcard ${(hasPerf&&i===0)?'best':''}">
      ${(hasPerf&&i===0)?'<span class="topbadge">★ top</span>':''}
      <div class="nm">${r.product||'—'}</div>
      <div class="vids">${r.videos} video${r.videos===1?'':'s'}</div>
      <div class="stats">
        <div><div class="v">${nfmt(r.views)}</div><div class="k">Views</div></div>
        <div><div class="v">${nfmt(r.likes)}</div><div class="k">Likes</div></div>
        <div><div class="v">${nfmt(r.shares)}</div><div class="k">Shares</div></div>
      </div>
    </div>`).join('')}</div>`;
})();
</script>
</body>
</html>
