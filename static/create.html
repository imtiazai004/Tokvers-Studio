<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #0f1420; color: #e6edf6; }
  a { color: inherit; }
  .top {
    display: flex; align-items: center; gap: 16px; padding: 12px 22px;
    background: #141b2b; border-bottom: 1px solid #20293c; position: sticky; top: 0; z-index: 5;
  }
  .brand { font-weight: 800; font-size: 1.05rem;
    background: linear-gradient(90deg,#06e8d8,#13b9d6,#ff0a5e); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .nav { display:flex; gap:6px; }
  .nav a { text-decoration:none; color:#9fb0c9; font-size:.9rem; padding:6px 12px; border-radius:8px; }
  .nav a.active, .nav a:hover { background:#1b2540; color:#e6edf6; }
  .top .spacer { flex: 1; }
  .pill { background: #1b2540; border: 1px solid #2a375a; padding: 6px 12px; border-radius: 999px; font-size: .85rem; }
  .pill b { color: #06e8d8; }
  button { font: inherit; cursor: pointer; border: none; border-radius: 9px; }
  .btn-ghost { background: #1b2540; color: #cdd9ee; border: 1px solid #2a375a; padding: 7px 12px; font-size: .85rem; }
  .btn-primary { background: linear-gradient(90deg,#13b9d6,#ff0a5e); color: #fff; font-weight: 700; padding: 12px; width: 100%; font-size: .98rem; }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
  .wrap { display: grid; grid-template-columns: 380px 1fr; gap: 20px; padding: 22px; max-width: 1100px; margin: 0 auto; }
  @media (max-width: 820px){ .wrap { grid-template-columns: 1fr; } }
  .card { background: #141b2b; border: 1px solid #20293c; border-radius: 14px; padding: 18px; }
  h2 { font-size: 1rem; margin-bottom: 14px; }
  label { display: block; font-size: .78rem; color: #9fb0c9; margin: 12px 0 5px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; font-size: .92rem; color: #e6edf6; font-family: inherit;
    background: #0f1626; border: 1px solid #2a375a; border-radius: 9px; outline: none;
  }
  textarea { resize: vertical; }
  input:focus, select:focus, textarea:focus { border-color: #13b9d6; }
  .jobs { display: flex; flex-direction: column; gap: 10px; }
  .job { background: #0f1626; border: 1px solid #20293c; border-radius: 11px; padding: 12px 14px; }
  .job-row { display: flex; align-items: center; gap: 10px; }
  .job-row .t { font-weight: 600; flex: 1; }
  .badge { font-size: .72rem; padding: 3px 9px; border-radius: 999px; font-weight: 700; }
  .b-queued  { background: #243; color: #8fe; }
  .b-running { background: #234a6b; color: #7cf; }
  .b-done    { background: #1c4a2e; color: #6f6; }
  .b-failed  { background: #4a2230; color: #f99; }
  .job .meta { font-size: .76rem; color: #8294af; margin-top: 5px; }
  .empty { color: #6b7a96; font-size: .88rem; padding: 8px 2px; }
  .err { display:none; margin-top:12px; background:#3a1620; border:1px solid #5b2433; color:#ffb3c0; padding:9px 12px; border-radius:9px; font-size:.83rem; }
  .err.show { display:block; }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">Tokverse Studio</span>
    <span class="nav"><a href="/" class="active">Create</a><a href="/dashboard">Dashboard</a><a href="/characters">Characters</a><a href="/content-library">Library</a><a href="/products">Products</a><a href="/learnings">Learnings</a></span>
    <span class="spacer"></span>
    <span class="pill">Credits: <b id="balance">…</b></span>
    <button class="btn-ghost" id="topupBtn">+ Add 50 (test)</button>
    <span class="pill" id="userPill">…</span>
    <button class="btn-ghost" id="logoutBtn">Log out</button>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>Create a video</h2>
      <label>Topic / product</label>
      <input id="topic" placeholder="e.g. Spicy Ramen Kit">
      <label>Niche</label>
      <input id="niche" placeholder="e.g. food_and_beverage">
      <label>Video type</label>
      <select id="vtype"></select>
      <label>Video provider</label>
      <select id="provider"></select>
      <label>Voice provider</label>
      <select id="voice"></select>
      <label>Character (optional, consistent face) — <a href="/characters" style="color:#13b9d6">manage</a></label>
      <select id="character"><option value="">None</option></select>
      <label>Product image (optional — image-to-video)</label>
      <input id="image" type="file" accept="image/*">
      <label>Manual script (optional — leave empty to auto-write)</label>
      <textarea id="manual" rows="3" placeholder="Your own voiceover script…"></textarea>
      <div style="display:flex; gap:10px">
        <div style="flex:1"><label>Scenes</label><input id="scenes" type="number" value="6" min="1" max="8"></div>
        <div style="flex:1"><label>Batch (videos)</label><input id="batch" type="number" value="1" min="1" max="10"></div>
      </div>
      <button class="btn-primary" id="genBtn" style="margin-top:18px">Generate</button>
      <div class="err" id="err"></div>
    </div>

    <div class="card">
      <h2>Your jobs</h2>
      <div class="jobs" id="jobs"><div class="empty">No jobs yet.</div></div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
async function api(path, opts) {
  const r = await fetch(path, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opts));
  if (r.status === 401) { window.location.href = '/login'; throw new Error('unauth'); }
  return r;
}
function showErr(m){ const e=$('err'); e.textContent=m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'), 5000); }

async function loadMe(){ const d = await (await api('/api/auth/me')).json();
  if(!d.authenticated){ window.location.href='/login'; return; } $('userPill').textContent = d.email; }
async function loadBalance(){ const d = await (await api('/api/credits/balance')).json(); $('balance').textContent = d.balance; }
async function loadProviders(){
  const d = await (await api('/api/providers')).json();
  const opt = p => `<option value="${p.id}">${p.label}${p.configured?'':' (no key)'}</option>`;
  $('provider').innerHTML = d.video.map(opt).join('');
  $('voice').innerHTML = d.voice.map(opt).join('');
  $('vtype').innerHTML = (d.video_types||[]).map(t=>`<option value="${t.id}">${t.label}</option>`).join('');
}
async function loadCharacters(){
  const d = await (await api('/api/characters')).json();
  $('character').innerHTML = '<option value="">None</option>' +
    (d.characters||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function fileToB64(file){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
function badge(s){ return `<span class="badge b-${s}">${s}</span>`; }
async function loadJobs(){
  const d = await (await api('/api/jobs')).json();
  const jobs = d.jobs || [];
  if(!jobs.length){ $('jobs').innerHTML = '<div class="empty">No jobs yet.</div>'; return; }
  $('jobs').innerHTML = jobs.map(j => `
    <div class="job">
      <div class="job-row"><span class="t">${(j.params&&j.params.topic)||j.provider||'job'}</span>${badge(j.status)}</div>
      <div class="meta">${j.provider||''} · step: ${j.step||'-'} · ${j.progress||0}%
        ${j.cost_estimate!=null?'· held '+j.cost_estimate:''}${j.error?'<br>⚠ '+j.error:''}</div>
    </div>`).join('');
}
async function refresh(){ await Promise.all([loadBalance(), loadJobs()]); }

$('genBtn').addEventListener('click', async () => {
  const topic = $('topic').value.trim();
  if(!topic){ showErr('Enter a topic.'); return; }
  $('genBtn').disabled = true; $('genBtn').textContent = 'Submitting…';
  try {
    let product_image = null;
    const f = $('image').files[0];
    if (f) product_image = await fileToB64(f);
    const r = await api('/api/jobs', { method:'POST', body: JSON.stringify({
      topic, niche: $('niche').value.trim()||null,
      provider: $('provider').value, voice_provider: $('voice').value,
      video_type: $('vtype').value, scenes: parseInt($('scenes').value)||6,
      manual_script: $('manual').value.trim()||null, character_id: $('character').value||null,
      product_image, batch_count: parseInt($('batch').value)||1,
    })});
    if(r.status === 402){ showErr('Not enough credits — click "+ Add 50".'); }
    else if(!r.ok){ const e = await r.json(); showErr(e.error||'Failed to create job'); }
    await refresh();
  } catch(e){ if(e.message!=='unauth') showErr('Could not reach server.'); }
  $('genBtn').disabled = false; $('genBtn').textContent = 'Generate';
});
$('topupBtn').addEventListener('click', async () => {
  await api('/api/credits/topup', { method:'POST', body: JSON.stringify({ amount: 50 }) }); await loadBalance();
});
$('logoutBtn').addEventListener('click', async () => { await api('/api/auth/logout', { method:'POST' }); window.location.href='/login'; });

(async () => {
  await loadMe(); await loadProviders(); await loadCharacters(); await refresh();
  setInterval(refresh, 3000);   // live status polling
})();
</script>
</body>
</html>
