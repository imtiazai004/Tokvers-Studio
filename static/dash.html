<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<link rel="stylesheet" href="/static/appui.css">
</head>
<body>
  <div class="top">
    <span class="brand"><img src="/static/logo-icon.png?v=2" alt="">Tokverse Studio</span>
    <span class="nav"><a href="/">Create</a><a href="/dashboard" class="active">Dashboard</a><a href="/characters">Characters</a><a href="/content-library">Library</a><a href="/products">Products</a><a href="/learnings">Learnings</a><a href="/analytics">Analytics</a></span>
  </div>
  <div class="main">
  <div class="topbar">
    <a href="/billing" class="pill" style="text-decoration:none">Credits: <b id="balance">…</b></a>
    <span class="pill" id="userPill">…</span>
    <button id="logoutBtn">Log out</button>
  </div>
  <div class="wrap">
    <div class="kpis" id="kpis"></div>
    <h2>Recent jobs</h2>
    <div id="recent"><div class="empty">Loading…</div></div>
  </div>
  </div>
<script>
const $=id=>document.getElementById(id);
async function api(p,o){ const r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));
  if(r.status===401){ location.href='/login'; throw new Error('unauth'); } return r; }
function badge(s){ return `<span class="badge b-${s}">${s}</span>`; }
function kpi(n,l,cls){ return `<div class="kpi ${cls||''}"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
async function load(){
  const me=await (await api('/api/auth/me')).json(); if(!me.authenticated){location.href='/login';return;} $('userPill').textContent=me.email;
  const d=await (await api('/api/dashboard')).json();
  $('balance').textContent=d.balance;
  $('kpis').innerHTML = kpi(d.jobs.total,'Total jobs')+kpi(d.jobs.done,'Completed','done')
    +kpi(d.jobs.failed,'Failed','failed')+kpi(d.jobs.running+d.jobs.queued,'In progress','running')
    +kpi(d.videos,'Videos')+kpi(d.balance,'Credits');
  $('recent').innerHTML = (d.recent && d.recent.length) ? d.recent.map(j=>`
    <div class="job"><div class="job-row"><span class="t">${j.topic||j.provider||'job'}</span>${badge(j.status)}</div>
    <div class="meta">${j.provider||''}${j.cost!=null?' · cost '+j.cost:''}${j.created_at?' · '+new Date(j.created_at).toLocaleString():''}</div></div>`).join('')
    : '<div class="empty">No jobs yet — go to Create.</div>';
}
$('logoutBtn').addEventListener('click', async()=>{ await api('/api/auth/logout',{method:'POST'}); location.href='/login'; });
load(); setInterval(load, 4000);
</script>
</body>
</html>
