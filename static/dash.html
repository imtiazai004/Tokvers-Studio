<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,sans-serif; background:#0f1420; color:#e6edf6; }
  .top { display:flex; align-items:center; gap:18px; padding:12px 22px; background:#141b2b; border-bottom:1px solid #20293c; position:sticky; top:0; }
  .brand { font-weight:800; background:linear-gradient(90deg,#06e8d8,#13b9d6,#ff0a5e); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .nav { display:flex; gap:6px; }
  .nav a { text-decoration:none; color:#9fb0c9; font-size:.9rem; padding:6px 12px; border-radius:8px; }
  .nav a.active, .nav a:hover { background:#1b2540; color:#e6edf6; }
  .spacer { flex:1; }
  .pill { background:#1b2540; border:1px solid #2a375a; padding:6px 12px; border-radius:999px; font-size:.85rem; }
  .pill b { color:#06e8d8; }
  button { font:inherit; cursor:pointer; border:none; border-radius:9px; background:#1b2540; color:#cdd9ee; border:1px solid #2a375a; padding:7px 12px; font-size:.85rem; }
  .wrap { max-width:1000px; margin:0 auto; padding:22px; }
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; }
  .kpi { background:#141b2b; border:1px solid #20293c; border-radius:13px; padding:16px; }
  .kpi .n { font-size:1.7rem; font-weight:800; }
  .kpi .l { font-size:.78rem; color:#8294af; margin-top:3px; }
  .kpi.done .n { color:#6f6; } .kpi.failed .n { color:#f99; } .kpi.running .n { color:#7cf; }
  h2 { font-size:1rem; margin:24px 0 12px; }
  .job { background:#141b2b; border:1px solid #20293c; border-radius:11px; padding:12px 14px; margin-bottom:9px; }
  .job-row { display:flex; align-items:center; gap:10px; }
  .job-row .t { font-weight:600; flex:1; }
  .badge { font-size:.72rem; padding:3px 9px; border-radius:999px; font-weight:700; }
  .b-queued{background:#243;color:#8fe;} .b-running{background:#234a6b;color:#7cf;}
  .b-done{background:#1c4a2e;color:#6f6;} .b-failed{background:#4a2230;color:#f99;}
  .meta { font-size:.76rem; color:#8294af; margin-top:4px; }
  .empty { color:#6b7a96; font-size:.9rem; padding:14px 2px; }
</style>
</head>
<body>
  <div class="top">
    <span class="brand">Tokverse Studio</span>
    <span class="nav"><a href="/">Create</a><a href="/dashboard" class="active">Dashboard</a><a href="/content-library">Library</a><a href="/products">Products</a><a href="/learnings">Learnings</a></span>
    <span class="spacer"></span>
    <span class="pill">Credits: <b id="balance">…</b></span>
    <span class="pill" id="userPill">…</span>
    <button id="logoutBtn">Log out</button>
  </div>
  <div class="wrap">
    <div class="kpis" id="kpis"></div>
    <h2>Recent jobs</h2>
    <div id="recent"><div class="empty">Loading…</div></div>
  </div>
<script>
const $=id=>document.getElementById(id);
async function api(p,o){ const r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));
  if(r.status===401){ location.href='/login'; throw new Error('unauth'); } return r; }
function badge(s){ return `<span class="badge b-${s}">${s}</span>`; }
function kpi(n,l,cls){ return `<div class="kpi ${cls||''}"><div class="n">${n}</div><div class="l">${l}</div></div>`; }
async function load(){
  const me=await (await api('/api/auth/me')).json(); if(!me.authenticated){location.href='/login';return;} $('userPill').textContent=me.email;
  const d=await (await api('/api/dashboard')).json();
  $('balance').textContent=d.balance;
  $('kpis').innerHTML = kpi(d.jobs.total,'Total jobs')+kpi(d.jobs.done,'Completed','done')
    +kpi(d.jobs.failed,'Failed','failed')+kpi(d.jobs.running+d.jobs.queued,'In progress','running')
    +kpi(d.videos,'Videos')+kpi(d.balance,'Credits');
  $('recent').innerHTML = (d.recent && d.recent.length) ? d.recent.map(j=>`
    <div class="job"><div class="job-row"><span class="t">${j.topic||j.provider||'job'}</span>${badge(j.status)}</div>
    <div class="meta">${j.provider||''}${j.cost!=null?' · cost '+j.cost:''}${j.created_at?' · '+new Date(j.created_at).toLocaleString():''}</div></div>`).join('')
    : '<div class="empty">No jobs yet — go to Create.</div>';
}
$('logoutBtn').addEventListener('click', async()=>{ await api('/api/auth/logout',{method:'POST'}); location.href='/login'; });
load(); setInterval(load, 4000);
</script>
</body>
</html>
