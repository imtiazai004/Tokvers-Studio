<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<link rel="stylesheet" href="/static/appui.css">
<style>
  .kpis { margin-bottom:8px; }
  td input { width:84px; padding:6px 8px; }
  td button { padding:6px 11px; }
  .tt { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .tt img.av { width:46px; height:46px; border-radius:50%; object-fit:cover; background:#eef3fb; }
  .tt .info { flex:1; min-width:160px; }
  .tt .info .nm { font-weight:700; }
  .tt .info .s { font-size:.8rem; color:var(--muted); margin-top:2px; }
  .btn-tt { background:linear-gradient(90deg,#06e8d8,#13b9d6,#ff0a5e); color:#fff; font-weight:700; border:none; padding:10px 16px; }
  .banner { display:none; padding:10px 14px; border-radius:10px; font-size:.85rem; margin-bottom:12px; }
  .banner.ok { display:block; background:#ecfdf5; border:1px solid #a7f3d0; color:#065f46; }
  .banner.err { display:block; background:#fff1f2; border:1px solid #fecdd3; color:#be123c; }
  .banner.info { display:block; background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
</style>
</head>
<body>
  <div class="top">
    <span class="brand"><img src="/static/logo-icon.png?v=2" alt="">Tokverse Studio</span>
    <span class="nav">
      <a href="/">Create</a><a href="/dashboard">Dashboard</a><a href="/characters">Characters</a>
      <a href="/content-library">Library</a><a href="/products">Products</a>
      <a href="/learnings">Learnings</a><a href="/analytics" class="active">Analytics</a><a href="/settings">Settings</a>
    </span>
  </div>
  <div class="main">
  <div class="topbar">
    <button id="logoutBtn">Log out</button>
  </div>
  <div class="wrap">
    <div class="banner" id="banner"></div>
    <h2>TikTok account</h2>
    <div class="card" id="ttcard"><div class="empty">Loading…</div></div>
    <h2>Analytics</h2>
    <div class="kpis" id="kpis"></div>
    <h2>Track performance</h2>
    <div class="card" id="table"><div class="empty">Loading…</div></div>
  </div>
  </div>
<script>
const $=id=>document.getElementById(id);
async function api(p,o){ const r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));
  if(r.status===401){ location.href='/login'; throw new Error('unauth'); } return r; }
$('logoutBtn').onclick=async()=>{ await api('/api/auth/logout',{method:'POST'}); location.href='/login'; };
function kpi(n,l){ return `<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`; }

function showBanner(){
  const m={connected:['ok','TikTok account connected ✓'],error:['err','Could not connect TikTok. Please try again.'],
    unconfigured:['info','TikTok integration is coming soon — it activates once our TikTok app is approved.']};
  const q=new URLSearchParams(location.search).get('tiktok');
  if(m[q]){ const b=$('banner'); b.textContent=m[q][1]; b.className='banner '+m[q][0];
    history.replaceState({},'',location.pathname); }
}
async function loadTikTok(){
  const s=await (await api('/api/tiktok/status')).json();
  const c=$('ttcard');
  if(s.connected){
    c.innerHTML=`<div class="tt">
      ${s.avatar_url?`<img class="av" src="${s.avatar_url}">`:`<img class="av">`}
      <div class="info"><div class="nm">${s.display_name||'TikTok account'}</div>
      <div class="s">Connected · auto-sync analytics &amp; publishing</div></div>
      <button id="ttoff">Disconnect</button></div>`;
    $('ttoff').onclick=async()=>{ await api('/api/tiktok/disconnect',{method:'POST'}); loadTikTok(); };
  } else if(s.configured){
    c.innerHTML=`<div class="tt"><div class="info"><div class="nm">Connect your TikTok</div>
      <div class="s">Auto-pull performance &amp; publish generated videos directly.</div></div>
      <a class="btn-tt" href="/api/tiktok/connect" style="border-radius:9px;text-decoration:none">Connect TikTok</a></div>`;
  } else {
    c.innerHTML=`<div class="tt"><div class="info"><div class="nm">TikTok integration — coming soon</div>
      <div class="s">Connect (analytics auto-sync + 1-click publishing) activates once our TikTok app is approved.</div></div>
      <button disabled>Connect TikTok</button></div>`;
  }
}
async function load(){
  const d=await (await api('/api/analytics')).json();
  const t=d.totals;
  $('kpis').innerHTML = kpi(t.videos,'Videos')+kpi(t.views.toLocaleString(),'Views')
    +kpi(t.likes.toLocaleString(),'Likes')+kpi(t.shares.toLocaleString(),'Shares');
  const vids=d.videos||[];
  $('table').innerHTML = vids.length ? `<table>
    <thead><tr><th>Video</th><th>Views</th><th>Likes</th><th>Shares</th><th></th></tr></thead>
    <tbody>${vids.map(v=>`<tr data-id="${v.id}">
      <td>${v.topic||'video'}</td>
      <td><input class="vw" type="number" value="${v.views}"></td>
      <td><input class="lk" type="number" value="${v.likes}"></td>
      <td><input class="sh" type="number" value="${v.shares}"></td>
      <td><button class="save">Save</button></td></tr>`).join('')}</tbody></table>`
    : '<div class="empty">No videos yet — generate some, then track their TikTok performance here.</div>';
  document.querySelectorAll('.save').forEach(b=>b.onclick=async()=>{
    const tr=b.closest('tr');
    await api('/api/videos/'+tr.dataset.id+'/metrics',{method:'POST',body:JSON.stringify({
      views:parseInt(tr.querySelector('.vw').value)||0,
      likes:parseInt(tr.querySelector('.lk').value)||0,
      shares:parseInt(tr.querySelector('.sh').value)||0 })});
    b.textContent='Saved'; setTimeout(()=>b.textContent='Save',1200); load();
  });
}
showBanner(); loadTikTok(); load();
</script>
</body>
</html>
