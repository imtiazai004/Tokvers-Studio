<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Flag Review · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #f4f6fb; color: #1a202c; padding: 32px; }
  .wrap { max-width: 1040px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
  .brand { background: linear-gradient(90deg, #06e8d8 0%, #13b9d6 42%, #ff0a5e 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #718096; font-size: 0.9rem; margin: 6px 0 22px; }
  .bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .count { font-size: 0.85rem; color: #4a5568; }
  .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.85rem; padding: 8px 14px; color: #fff; background: linear-gradient(90deg, #13b9d6, #ff0a5e); }
  .btn.ghost { background: #fff; color: #4a5568; border: 1px solid #e2e8f0; }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
  th, td { text-align: left; padding: 12px 14px; font-size: 0.85rem; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
  th { background: #f8fafc; color: #718096; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: .04em; }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.72rem; font-weight: 700; background: #fff1f2; color: #be123c; }
  .mono { font-family: ui-monospace, Consolas, monospace; font-size: 0.78rem; color: #4a5568; }
  .muted { color: #a0aec0; }
  .empty { text-align: center; padding: 48px; color: #718096; background: #fff; border-radius: 12px; }
  .row-actions { display: flex; gap: 8px; }
  .section-title { font-size: 1.05rem; font-weight: 800; margin: 28px 0 12px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
  .card .k { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .04em; color: #a0aec0; font-weight: 700; }
  .card .v { font-size: 1.5rem; font-weight: 800; margin-top: 4px; }
  .toggles { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
  .toggle { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 10px; padding: 12px 16px; box-shadow: 0 4px 18px rgba(0,0,0,0.06); }
  .toggle .lbl { font-weight: 700; font-size: 0.9rem; }
  .toggle .desc { font-size: 0.75rem; color: #a0aec0; }
  .sw { position: relative; width: 46px; height: 26px; border-radius: 999px; background: #cbd5e0; cursor: pointer; transition: background .2s; flex: none; }
  .sw.on { background: #16a34a; }
  .sw::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left .2s; }
  .sw.on::after { left: 23px; }
  .sw.busy { opacity: .5; pointer-events: none; }
</style>
</head>
<body>
  <div class="wrap">
    <h1><span class="brand">Admin Console</span></h1>
    <div class="sub">Live control panel. Toggles take effect within ~10 seconds — no redeploy.</div>

    <div class="bar">
      <button class="btn ghost" id="refreshBtn" type="button">↻ Refresh</button>
      <span class="count" id="count"></span>
    </div>

    <div class="section-title">System</div>
    <div class="cards" id="metrics"><div class="empty">Loading…</div></div>
    <div class="toggles" id="toggles"></div>

    <div class="section-title">Users</div>
    <div class="bar">
      <input id="userSearch" placeholder="Search email or name…" style="flex:1;max-width:340px;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;outline:none;font-size:0.88rem">
      <button class="btn ghost" id="userSearchBtn" type="button">Search</button>
    </div>
    <div id="users"><div class="empty">Loading…</div></div>

    <div class="section-title">Flag Review <span class="muted" style="font-weight:500;font-size:0.8rem">— suspected duplicate device; approve to clear + grant free credits</span></div>
    <div id="content"><div class="empty">Loading…</div></div>
  </div>

<script>
  const content = document.getElementById('content');
  const countEl = document.getElementById('count');

  function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  async function load() {
    content.innerHTML = '<div class="empty">Loading…</div>';
    try {
      const res = await fetch('/api/admin/flagged');
      if (!res.ok) { content.innerHTML = '<div class="empty">Not authorized.</div>'; return; }
      const rows = (await res.json()).flagged || [];
      countEl.textContent = rows.length + ' flagged account' + (rows.length === 1 ? '' : 's');
      if (!rows.length) { content.innerHTML = '<div class="empty">🎉 No flagged accounts. All clear.</div>'; return; }
      let html = '<table><thead><tr><th>Email</th><th>Name</th><th>Reason</th><th>Signup IP</th><th>Fingerprint</th><th>Verified</th><th>Created</th><th></th></tr></thead><tbody>';
      for (const u of rows) {
        html += '<tr id="row-' + esc(u.id) + '">'
          + '<td>' + esc(u.email) + '</td>'
          + '<td>' + (esc(u.name) || '<span class="muted">—</span>') + '</td>'
          + '<td><span class="tag">' + esc(u.flag_reason || 'flagged') + '</span></td>'
          + '<td class="mono">' + (esc(u.signup_ip) || '<span class="muted">—</span>') + '</td>'
          + '<td class="mono">' + (esc(u.fingerprint) || '<span class="muted">—</span>') + '</td>'
          + '<td>' + (u.email_verified ? '✅' : '<span class="muted">no</span>') + '</td>'
          + '<td class="muted">' + esc((u.created_at || '').slice(0, 10)) + '</td>'
          + '<td class="row-actions">'
          + '<button class="btn" data-id="' + esc(u.id) + '" data-credits="1">Approve + credits</button>'
          + '<button class="btn ghost" data-id="' + esc(u.id) + '" data-credits="0">Approve only</button>'
          + '</td></tr>';
      }
      html += '</tbody></table>';
      content.innerHTML = html;
      content.querySelectorAll('button[data-id]').forEach(b => b.addEventListener('click', () => approve(b)));
    } catch (e) {
      content.innerHTML = '<div class="empty">Could not load. Try refresh.</div>';
    }
  }

  async function approve(btn) {
    const id = btn.getAttribute('data-id');
    const grant = btn.getAttribute('data-credits') === '1';
    content.querySelectorAll('button[data-id="' + id + '"]').forEach(x => x.disabled = true);
    btn.textContent = 'Approving…';
    try {
      const res = await fetch('/api/admin/users/' + id + '/approve?grant_credits=' + grant, { method: 'POST' });
      if (res.ok) {
        const row = document.getElementById('row-' + id);
        if (row) row.remove();
        const left = content.querySelectorAll('tbody tr').length;
        countEl.textContent = left + ' flagged account' + (left === 1 ? '' : 's');
        if (!left) content.innerHTML = '<div class="empty">🎉 No flagged accounts. All clear.</div>';
      } else {
        btn.textContent = 'Failed'; content.querySelectorAll('button[data-id="' + id + '"]').forEach(x => x.disabled = false);
      }
    } catch (e) {
      btn.textContent = 'Failed'; content.querySelectorAll('button[data-id="' + id + '"]').forEach(x => x.disabled = false);
    }
  }

  // ── System: metrics + live toggles ──────────────────────────
  const metricsEl = document.getElementById('metrics');
  const togglesEl = document.getElementById('toggles');
  const TOGGLE_META = {
    generation_enabled: { label: 'Generation', desc: 'Master switch for all video generation' },
    signup_enabled: { label: 'Signups', desc: 'Allow new account creation' },
  };

  async function loadSystem() {
    try {
      const m = await (await fetch('/api/admin/metrics')).json();
      const j = m.jobs || {};
      const cards = [
        ['Users', m.users], ['Verified', m.users_verified], ['Flagged', m.users_flagged],
        ['Workspaces', m.workspaces], ['Videos', m.videos],
        ['Credits out', Math.round(m.credits_outstanding)],
        ['Jobs running', j.running], ['Jobs failed', j.failed],
      ];
      metricsEl.innerHTML = cards.map(c =>
        '<div class="card"><div class="k">' + esc(c[0]) + '</div><div class="v">' + esc(c[1] ?? 0) + '</div></div>').join('');
    } catch (e) { metricsEl.innerHTML = '<div class="empty">Could not load metrics.</div>'; }

    try {
      const s = (await (await fetch('/api/admin/settings')).json()).settings || {};
      togglesEl.innerHTML = Object.keys(TOGGLE_META).map(k => {
        const on = !!s[k]; const meta = TOGGLE_META[k];
        return '<div class="toggle"><div><div class="lbl">' + esc(meta.label) + '</div><div class="desc">' + esc(meta.desc) + '</div></div>'
          + '<div class="sw ' + (on ? 'on' : '') + '" data-key="' + esc(k) + '" data-on="' + on + '"></div></div>';
      }).join('');
      togglesEl.querySelectorAll('.sw').forEach(sw => sw.addEventListener('click', () => toggle(sw)));
    } catch (e) { togglesEl.innerHTML = ''; }
  }

  async function toggle(sw) {
    const key = sw.getAttribute('data-key');
    const next = sw.getAttribute('data-on') !== 'true';
    sw.classList.add('busy');
    try {
      const res = await fetch('/api/admin/settings', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: key, value: next }),
      });
      if (res.ok) { sw.setAttribute('data-on', next); sw.classList.toggle('on', next); }
    } catch (e) { /* leave as-is */ }
    sw.classList.remove('busy');
  }

  // ── Users: search + per-user actions ────────────────────────
  const usersEl = document.getElementById('users');

  function badge(text, color) {
    const c = { green: '#16a34a', red: '#be123c', amber: '#b45309', gray: '#718096' }[color] || '#718096';
    const bg = { green: '#f0fdf4', red: '#fff1f2', amber: '#fffbeb', gray: '#f1f5f9' }[color] || '#f1f5f9';
    return '<span class="tag" style="background:' + bg + ';color:' + c + '">' + esc(text) + '</span>';
  }

  async function loadUsers(q) {
    usersEl.innerHTML = '<div class="empty">Loading…</div>';
    try {
      const url = '/api/admin/users' + (q ? ('?q=' + encodeURIComponent(q)) : '');
      const rows = (await (await fetch(url)).json()).users || [];
      if (!rows.length) { usersEl.innerHTML = '<div class="empty">No users found.</div>'; return; }
      let html = '<table><thead><tr><th>Email</th><th>Status</th><th>Credits</th><th>Joined</th><th>Actions</th></tr></thead><tbody>';
      for (const u of rows) {
        let tags = '';
        if (u.is_admin) tags += badge('admin', 'green');
        tags += u.email_verified ? badge('verified', 'gray') : badge('unverified', 'amber');
        if (u.flagged) tags += badge('flagged', 'red');
        if (u.suspended) tags += badge('suspended', 'red');
        const d = 'data-id="' + esc(u.id) + '"';
        html += '<tr id="u-' + esc(u.id) + '">'
          + '<td>' + esc(u.email) + (u.name ? '<div class="muted" style="font-size:0.78rem">' + esc(u.name) + '</div>' : '') + '</td>'
          + '<td>' + tags + '</td>'
          + '<td class="mono">' + esc(Math.round(u.credits)) + '</td>'
          + '<td class="muted">' + esc((u.created_at || '').slice(0, 10)) + '</td>'
          + '<td class="row-actions" style="flex-wrap:wrap">'
          + (u.email_verified ? '' : '<button class="btn ghost" data-act="verify-email" ' + d + '>Verify</button>')
          + '<button class="btn ghost" data-act="adjust-credits" ' + d + '>±Credits</button>'
          + '<button class="btn ghost" data-act="force-logout" ' + d + '>Log out</button>'
          + '<button class="btn ghost" data-act="set-admin" data-val="' + (!u.is_admin) + '" ' + d + '>' + (u.is_admin ? 'Remove admin' : 'Make admin') + '</button>'
          + '<button class="btn" data-act="suspend" data-val="' + (!u.suspended) + '" ' + d + '>' + (u.suspended ? 'Unsuspend' : 'Suspend') + '</button>'
          + '</td></tr>';
      }
      html += '</tbody></table>';
      usersEl.innerHTML = html;
      usersEl.querySelectorAll('button[data-act]').forEach(b => b.addEventListener('click', () => userAction(b)));
    } catch (e) { usersEl.innerHTML = '<div class="empty">Could not load users.</div>'; }
  }

  async function userAction(btn) {
    const id = btn.getAttribute('data-id');
    const act = btn.getAttribute('data-act');
    let body = null;
    if (act === 'set-admin' || act === 'suspend') body = { value: btn.getAttribute('data-val') === 'true' };
    if (act === 'adjust-credits') {
      const raw = prompt('Credits to add (use a negative number to deduct):', '10');
      if (raw === null) return;
      const amt = parseFloat(raw);
      if (!amt) return;
      body = { amount: amt };
    }
    btn.disabled = true;
    try {
      const res = await fetch('/api/admin/users/' + id + '/' + act, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : null,
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.detail || 'Action failed'); btn.disabled = false; return; }
      loadUsers(document.getElementById('userSearch').value.trim());
    } catch (e) { alert('Action failed'); btn.disabled = false; }
  }

  document.getElementById('userSearchBtn').addEventListener('click', () => loadUsers(document.getElementById('userSearch').value.trim()));
  document.getElementById('userSearch').addEventListener('keydown', e => { if (e.key === 'Enter') loadUsers(e.target.value.trim()); });

  function refreshAll() { loadSystem(); loadUsers(''); load(); }
  document.getElementById('refreshBtn').addEventListener('click', refreshAll);
  refreshAll();
</script>
</body>
</html>
