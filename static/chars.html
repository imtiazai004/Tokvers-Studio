<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characters · Tokverse Studio</title>
<link rel="icon" href="/static/logo-icon.png?v=2" type="image/png">
<link rel="stylesheet" href="/static/appui.css">
<style>
  .cols { display:grid; grid-template-columns:360px 1fr; gap:20px; align-items:start; }
  @media(max-width:820px){ .cols{ grid-template-columns:1fr; } }
  .btn-primary{ padding:11px; width:100%; margin-top:16px; }
  .chr{ display:flex; gap:12px; align-items:center; }
  .chr img{ width:54px; height:54px; border-radius:10px; object-fit:cover; background:#eef3fb; }
  .chr .nm{ flex:1; } .chr .nm .s{ font-size:.76rem; color:var(--muted); }
  .del{ color:#b91c1c; background:#fee2e2; border-color:#fecaca; }
</style>
</head>
<body>
  <div class="top">
    <span class="brand"><img src="/static/logo-icon.png?v=2" alt="">Tokverse Studio</span>
    <span class="nav">
      <a href="/">Create</a><a href="/dashboard">Dashboard</a>
      <a href="/characters" class="active">Characters</a>
      <a href="/content-library">Library</a><a href="/products">Products</a><a href="/learnings">Learnings</a><a href="/analytics">Analytics</a>
    </span>
  </div>
  <div class="main">
  <div class="topbar">
    <button id="logoutBtn">Log out</button>
  </div>
  <div class="wrap cols">
    <div class="card">
      <h2>New character</h2>
      <label>Name</label><input id="name" placeholder="e.g. Sara">
      <label>Appearance</label><textarea id="appearance" rows="2" placeholder="e.g. South Asian woman, 20s, dark wavy hair"></textarea>
      <label>Personality / vibe</label><input id="personality" placeholder="e.g. warm, energetic">
      <label>Niche</label><input id="niche" placeholder="e.g. beauty">
      <label>Voice</label>
      <select id="voice_gender"><option value="female">Female</option><option value="male">Male</option></select>
      <label>Reference image (face — for consistency)</label>
      <input id="image" type="file" accept="image/*">
      <button class="btn-primary" id="saveBtn">Save character</button>
      <div class="err" id="err"></div>
    </div>
    <div class="card">
      <h2>Your characters</h2>
      <div id="list"><div class="empty">Loading…</div></div>
    </div>
  </div>
  </div>
<script>
const $=id=>document.getElementById(id);
async function api(p,o){ const r=await fetch(p,Object.assign({headers:{'Content-Type':'application/json'}},o));
  if(r.status===401){ location.href='/login'; throw new Error('unauth'); } return r; }
function b64(file){ return new Promise((res,rej)=>{ const r=new FileReader();
  r.onload=()=>res(String(r.result).split(',')[1]); r.onerror=rej; r.readAsDataURL(file); }); }
$('logoutBtn').onclick=async()=>{ await api('/api/auth/logout',{method:'POST'}); location.href='/login'; };

async function load(){
  const d=await (await api('/api/characters')).json();
  const cs=d.characters||[];
  $('list').innerHTML = cs.length ? cs.map(c=>`
    <div class="card chr">
      ${c.has_image?`<img src="">`:`<img>`}
      <div class="nm">${c.name}<div class="s">${c.appearance||''} · ${c.voice_gender}</div></div>
      <button class="del" data-id="${c.id}">Delete</button>
    </div>`).join('') : '<div class="empty">No characters yet.</div>';
  document.querySelectorAll('.del').forEach(b=>b.onclick=async()=>{
    await api('/api/characters/'+b.dataset.id,{method:'DELETE'}); load(); });
}
$('saveBtn').onclick=async()=>{
  const name=$('name').value.trim(); if(!name){ const e=$('err'); e.textContent='Name required'; e.classList.add('show'); return; }
  $('saveBtn').disabled=true; $('saveBtn').textContent='Saving…';
  let image=null; const f=$('image').files[0]; if(f) image=await b64(f);
  await api('/api/characters',{method:'POST',body:JSON.stringify({
    name, appearance:$('appearance').value.trim(), personality:$('personality').value.trim(),
    niche:$('niche').value.trim()||'lifestyle', voice_gender:$('voice_gender').value, image })});
  $('name').value=$('appearance').value=$('personality').value=$('niche').value=''; $('image').value='';
  $('saveBtn').disabled=false; $('saveBtn').textContent='Save character'; load();
};
load();
</script>
</body>
</html>
