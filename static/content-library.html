<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Library · Tokverse</title>
<link rel="icon" href="/static/logo.png?v=3" type="image/png">
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/library.css">
</head>
<body>
<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-backdrop" onclick="toggleSidebar()"></div>
<nav class="app-sidebar" id="appSidebar"></nav>
<script src="/static/sidebar.js"></script>

<div class="app-main">
  <div class="container">
    <div class="page-head">
      <div>
        <h1>📚 Content Library</h1>
        <p class="page-sub">Every UGC video your agents have generated — with performance metrics.</p>
      </div>
      <a href="/" class="es-btn">+ Create New Video</a>
    </div>

    <div class="stat-strip" id="statStrip">
      <div class="stat-box"><div class="stat-label">Total Videos</div><div class="stat-value" id="sTotal">—</div></div>
      <div class="stat-box"><div class="stat-label">Total Views</div><div class="stat-value" id="sViews">—</div></div>
      <div class="stat-box"><div class="stat-label">Total Likes</div><div class="stat-value" id="sLikes">—</div></div>
      <div class="stat-box"><div class="stat-label">Total Shares</div><div class="stat-value" id="sShares">—</div></div>
    </div>

    <div id="content"></div>
  </div>
</div>

<script>
  function fmt(n) {
    n = Number(n) || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toString();
  }
  function fmtDate(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); }
    catch (e) { return d; }
  }
  function nicheLabel(n) { return (n || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

  async function load() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading-row">Loading your videos…</div>';
    try {
      const res = await fetch('/api/content-library');
      const data = await res.json();
      const videos = data.videos || [];

      // stats
      document.getElementById('sTotal').textContent = videos.length;
      document.getElementById('sViews').textContent = fmt(videos.reduce((a, v) => a + (v.views || 0), 0));
      document.getElementById('sLikes').textContent = fmt(videos.reduce((a, v) => a + (v.likes || 0), 0));
      document.getElementById('sShares').textContent = fmt(videos.reduce((a, v) => a + (v.shares || 0), 0));

      if (videos.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="es-icon">🎬</div>
            <div class="es-title">No videos yet</div>
            <div class="es-text">Once you generate UGC videos, they'll appear here with their performance.</div>
            <a href="/" class="es-btn">+ Create Your First Video</a>
          </div>`;
        return;
      }

      content.innerHTML = '<div class="card-grid">' + videos.map(v => `
        <div class="data-card">
          <div class="dc-title">${escapeHtml(v.topic || 'Untitled')}</div>
          <div class="dc-sub">${nicheLabel(v.niche)} • ${fmtDate(v.date)}</div>
          <div class="dc-metrics">
            <div class="dc-metric"><strong>${fmt(v.views)}</strong>Views</div>
            <div class="dc-metric"><strong>${fmt(v.likes)}</strong>Likes</div>
            <div class="dc-metric"><strong>${fmt(v.shares)}</strong>Shares</div>
          </div>
          <div class="dc-tags">
            <span class="dc-tag">${(v.tool || 'grok').toUpperCase()}</span>
            ${v.character ? `<span class="dc-tag pink">👤 ${escapeHtml(v.character)}</span>` : ''}
            <span class="dc-tag gray">Score ${Math.round(v.score || 0)}</span>
          </div>
        </div>`).join('') + '</div>';
    } catch (e) {
      content.innerHTML = '<div class="loading-row">Could not load videos. Is the server running?</div>';
    }
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  load();
</script>
</body>
</html>
